<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Page</title>
    <style>
        /* same CSS as before */
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; padding: 30px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 12px; padding: 2rem; }
        fieldset { border: 2px solid #e0e6ed; border-radius: 10px; padding: 1.5rem; }
        legend { font-weight: 600; color: #2a5298; padding: 0 10px; }
        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: #444; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn { padding: 0.8rem 1.8rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Search Records</h2>
        
        <form th:action="@{/search}" method="post">
            <fieldset>
                <legend>Search Criteria</legend>
                
                <div class="search-grid">
                    <div class="form-group">
                        <label>Status *</label>
                        <select name="statusCode" required>
                            <option value="">-- Select Status --</option>
                            <option th:each="s : ${statusList}" 
                                    th:value="${s.code}" 
                                    th:text="${s.description}">
                            </option>
                        </select>
                    </div>
                    
                    
                </div>
                
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </fieldset>
        </form>
    </div>
</body>
</html>
