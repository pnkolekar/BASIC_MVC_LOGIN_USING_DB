<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Page</title>
	<style>

	        body{
	            font-family:'Segoe UI',sans-serif;
	            background:#f5f7fa;
	            margin:0;
	            padding:30px;
	        }

	        .container{
	            max-width:1200px;
	            margin:auto;
	            background:#fff;
	            padding:25px;
	            border-radius:10px;
	            box-shadow:0 4px 12px rgba(0,0,0,.1);
	        }

	        h2{
	            text-align:center;
	            color:#2a5298;
	            margin-bottom:25px;
	        }

	        fieldset{
	            border:2px solid #dfe6e9;
	            border-radius:8px;
	            padding:20px;
	        }

	        legend{
	            color:#2a5298;
	            font-weight:bold;
	            padding:0 10px;
	        }

	        .search-grid{
	            display:grid;
	            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
	            gap:20px;
	        }

	        .form-group label{
	            display:block;
	            margin-bottom:8px;
	            font-weight:600;
	            color:#444;
	        }

	        .form-group select{
	            width:100%;
	            padding:10px;
	            border:1px solid #ccc;
	            border-radius:6px;
	            font-size:15px;
	        }

	        .button-row{
	            margin-top:20px;
	            text-align:center;
	        }

	        .btn{
	            padding:12px 30px;
	            background:#2a5298;
	            color:white;
	            border:none;
	            border-radius:6px;
	            cursor:pointer;
	            font-size:15px;
	        }

	        .btn:hover{
	            background:#1e3c72;
	        }

	        .table-container{
	            margin-top:35px;
	            overflow-x:auto;
	        }

	        table{
	            width:100%;
	            border-collapse:collapse;
	        }

	        table th{
	            background:#2a5298;
	            color:white;
	            padding:12px;
	            text-align:left;
	        }

	        table td{
	            padding:10px;
	            border-bottom:1px solid #ddd;
	        }

	        table tr:nth-child(even){
	            background:#f9f9f9;
	        }

	        table tr:hover{
	            background:#eef4ff;
	        }

	        .message{
	            margin-top:25px;
	            padding:15px;
	            background:#fff3cd;
	            color:#856404;
	            border:1px solid #ffeeba;
	            border-radius:6px;
	            text-align:center;
	        }

	        .count{
	            margin:20px 0;
	            font-weight:bold;
	            color:#2a5298;
	        }

	    </style>
</head>
<body>
    <div class="container">
        <h2>Search Records</h2>
        
        <form th:action="@{/search}" method="post">
            <fieldset>
                <legend>Search Criteria</legend>
                
                <div class="search-grid">
                    <div class="form-group">
                        <label>Status *</label>
                        <select name="statusCode" required>
                            <option value="">-- Select Status --</option>
                            <option th:each="s : ${statusList}" 
                                    th:value="${s.code}" 
                                    th:text="${s.description}">
                            </option>
                        </select>
                    </div>
                    
                    
                </div>
                
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </fieldset>
			
			
			
			<div class="count" th:if="${records != null}">
			        Total Records :
			        <span th:text="${#lists.size(records)}"></span>
			    </div>
			<div class="table-container"
			     th:if="${records != null and !#lists.isEmpty(records)}">

			    <table>

			        <thead>
			        <tr>
			            <th>Sr No.</th>
			            <th>Consumer No</th>
			            <th>Consumer Name</th>
			            <th>Circle</th>
			            <th>Tender</th>
			            <th>Load (HP)</th>
			        </tr>
			        </thead>

			        <tbody>

			        <tr th:each="record, stat : ${records}">

			            <td th:text="${stat.count}"></td>

			            <td th:text="${record.consumerNo}"></td>

			            <td th:text="${record.consumerName}"></td>

			            <td th:text="${record.circle}"></td>

			            <td th:text="${record.tenderNo}"></td>

			            <td th:text="${record.loadHP}"></td>

			        </tr>

			        </tbody>

			    </table>

			</div>
			
        </form>
    </div>
</body>
</html>
